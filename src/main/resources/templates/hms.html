<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCore HMS</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🏥</div>
      <div class="sidebar-logo-text">
        MediCore HMS
        <span id="sidebarRoleText">…</span>
      </div>
    </div>
    <div class="sidebar-role-badge">
      <span class="role-dot"></span>
      <span class="role-name" id="roleBadge">—</span>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">--</div>
        <div class="user-info">
          <div class="user-name" id="userName">…</div>
          <div class="user-role" id="userRoleName">—</div>
        </div>
        <form th:action="@{/logout}" method="post" style="display:inline;margin:0;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="logout-btn" title="Logout" style="background:none;border:none;padding:8px;cursor:pointer;color:inherit;">
            <i class="fas fa-right-from-bracket"></i>
          </button>
        </form>
      </div>
    </div>
  </aside>
  <div class="main-content">
    <header class="top-header">
      <div class="header-title">
        <h1 id="headerTitle">Dashboard</h1>
        <p id="headerSub">Welcome</p>
      </div>
      <div class="header-spacer"></div>
      <div class="header-date" id="liveDate">—</div>
    </header>
    <div class="page-content">
      <div class="page active" id="page-dashboard"></div>
      <div class="page" id="page-visits"></div>
      <div class="page" id="page-bills"></div>
      <div class="page" id="page-patients"></div>
      <div class="page" id="page-inventory"></div>
      <div class="page" id="page-accounting"></div>
      <div class="page" id="page-settings"></div>
      <div class="page" id="page-reports"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="visitModal" style="display:none;">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="visitModalTitle">Visit</div>
      <button type="button" class="modal-close" id="visitModalClose"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="visitModalBody"></div>
  </div>
</div>

<script th:src="@{/js/hms.js}"></script>
</body>
</html>
